name: release

# Cut a Kue release: build self-contained `kue` binaries per platform and
# publish them as GitHub Release assets on a `v*` tag push.
#
# Lean 4 / lake links the Lean runtime statically into the executable; on
# macOS the only dynamic deps are /usr/lib system libraries (libc++,
# libSystem), so the uploaded binary is self-contained and the Homebrew
# formula can `bin.install` it directly. See
# docs/notes/2026-06-16-release-and-homebrew-setup.md for the rationale.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build kue
        run: |
          # elan reads lean-toolchain and fetches the pinned toolchain on first use.
          lake build kue

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp .lake/build/bin/kue "dist/kue-${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kue-${{ matrix.target }}
          path: dist/kue-${{ matrix.target }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Kue $TAG" \
            --generate-notes \
            dist/kue-*
